version: "3.9"

services:
  api:
    build: .
    container_name: maji-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./sample_data:/app/sample_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: maji-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000/api/v1
    depends_on:
      - api
    restart: unless-stopped
